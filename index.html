<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pixel Art 8-Bit</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    canvas {
      margin-top: 20px;
      border: 2px solid white;
      image-rendering: pixelated;
    }

    button {
      margin: 5px;
      padding: 12px 20px;
      font-size: 14px;
      background: #6366f1;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 8px;
    }

    .progress-container {
      width: 300px;
      height: 20px;
      background: #1e293b;
      border-radius: 10px;
      margin: 15px auto;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #6366f1;
      transition: width 0.1s;
    }

    #textoProgreso {
      margin-top: 5px;
      font-size: 14px;
      color: #cbd5f5;
    }
  </style>
</head>
<body>

<h1>Lys, Quieres ver algo hermoso? </h1>

<button id="btn">Generar Imagen</button>
<button id="muteBtn">🔊 Sonido ON</button>
<button id="downloadBtn">💾 Descargar Imagen</button>

<div class="progress-container">
  <div class="progress-bar" id="barra"></div>
</div>

<div id="textoProgreso">Esperando...</div>

<canvas id="canvas"></canvas>

<script src="script.js"></script>

</body>
</html>
